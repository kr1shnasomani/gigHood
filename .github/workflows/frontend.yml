name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

concurrency:
  group: frontend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload production bundle artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-production-bundle
          path: |
            frontend/.next
            frontend/public
            frontend/package.json
            frontend/package-lock.json
            frontend/next.config.ts
          if-no-files-found: error

  frontend-cd-artifact:
    name: Frontend CD (Artifact)
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-production-bundle
          path: release/frontend

      - name: Summarize release contents
        run: |
          echo "Frontend production bundle prepared for deployment." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Contents:" >> "$GITHUB_STEP_SUMMARY"
          find release/frontend -maxdepth 3 -type f | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
